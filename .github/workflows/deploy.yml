name: Deploy Mini App to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject API URL
        run: |
          API="${{ secrets.API_URL }}"
          if [ -n "$API" ]; then
            sed -i "s|http://localhost:3000|${API}|g" miniapp/index.html
            echo "API_URL injectée : ${API}"
          fi

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: miniapp

      - id: deployment
        uses: actions/deploy-pages@v4
