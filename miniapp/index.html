<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Boutique</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        var(--tg-theme-bg-color, #0f0f11);
      --surface:   var(--tg-theme-secondary-bg-color, #1a1a1f);
      --text:      var(--tg-theme-text-color, #f0f0f0);
      --hint:      var(--tg-theme-hint-color, #888);
      --accent:    var(--tg-theme-button-color, #5c67f2);
      --accent-fg: var(--tg-theme-button-text-color, #fff);
      --link:      var(--tg-theme-link-color, #7c86ff);
      --radius:    14px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      min-height: 100dvh;
      padding-bottom: 80px;
    }

    /* Header */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid rgba(255,255,255,.07);
      padding: 12px 16px;
    }
    .header-top {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 10px;
    }
    .store-title { font-size: 20px; font-weight: 700; letter-spacing: -.3px; flex: 1; }
    .cart-btn {
      position: relative; background: var(--surface);
      border: none; border-radius: 50%;
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 20px; transition: transform .15s;
    }
    .cart-btn:active { transform: scale(.9); }
    .cart-badge {
      position: absolute; top: -4px; right: -4px;
      background: #ff4d4f; color: #fff;
      border-radius: 99px; font-size: 10px; font-weight: 700;
      padding: 1px 5px; min-width: 18px; text-align: center; display: none;
    }
    .cart-badge.visible { display: block; }

    .search-bar {
      display: flex; align-items: center;
      background: var(--surface); border-radius: 10px;
      padding: 8px 12px; gap: 8px;
    }
    .search-bar input {
      background: none; border: none; outline: none;
      color: var(--text); font-size: 15px; width: 100%;
    }
    .search-bar input::placeholder { color: var(--hint); }

    /* Categories */
    .cats-scroll {
      display: flex; gap: 8px;
      padding: 12px 16px;
      overflow-x: auto; scrollbar-width: none;
    }
    .cats-scroll::-webkit-scrollbar { display: none; }
    .cat-chip {
      display: flex; align-items: center; gap: 5px;
      background: var(--surface);
      border: 1.5px solid transparent;
      border-radius: 99px; padding: 6px 14px;
      cursor: pointer; white-space: nowrap;
      font-size: 13px; font-weight: 500;
      transition: border-color .2s, background .2s;
      user-select: none;
    }
    .cat-chip.active {
      border-color: var(--accent);
      background: color-mix(in srgb, var(--accent) 15%, transparent);
      color: var(--link);
    }

    /* Product Grid */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px; padding: 0 16px;
    }
    .product-card {
      background: var(--surface); border-radius: var(--radius);
      overflow: hidden; cursor: pointer;
      transition: transform .2s;
      animation: fadeUp .3s ease both;
    }
    .product-card:active { transform: scale(.97); }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .product-img {
      width: 100%; aspect-ratio: 1/1;
      object-fit: cover; background: #222;
    }
    .product-info { padding: 10px; }
    .product-name {
      font-size: 13px; font-weight: 600;
      display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; margin-bottom: 4px;
    }
    .product-price { font-size: 15px; font-weight: 700; color: var(--link); }
    .product-add-btn {
      display: block; width: 100%; margin-top: 8px;
      background: var(--accent); color: var(--accent-fg);
      border: none; border-radius: 8px; padding: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: opacity .15s;
    }
    .product-add-btn:active { opacity: .75; }

    /* Cart drawer */
    .cart-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 200; opacity: 0; pointer-events: none;
      transition: opacity .25s;
    }
    .cart-overlay.open { opacity: 1; pointer-events: all; }
    .cart-drawer {
      position: fixed; left: 0; right: 0; bottom: 0;
      z-index: 201; background: var(--surface);
      border-radius: 20px 20px 0 0; padding: 16px;
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.4,0,.2,1);
      max-height: 75dvh; display: flex; flex-direction: column;
    }
    .cart-drawer.open { transform: translateY(0); }
    .cart-handle {
      width: 40px; height: 4px;
      background: rgba(255,255,255,.2);
      border-radius: 99px; margin: 0 auto 14px;
    }
    .cart-title { font-size: 17px; font-weight: 700; margin-bottom: 14px; }
    .cart-items {
      overflow-y: auto; flex: 1;
      display: flex; flex-direction: column; gap: 10px;
    }
    .cart-item { display: flex; align-items: center; gap: 12px; }
    .cart-item img {
      width: 52px; height: 52px;
      border-radius: 10px; object-fit: cover; flex-shrink: 0;
    }
    .cart-item-info { flex: 1; }
    .cart-item-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
    .cart-item-price { font-size: 12px; color: var(--hint); }
    .qty-controls { display: flex; align-items: center; gap: 8px; }
    .qty-btn {
      width: 28px; height: 28px;
      background: var(--bg); border: none; border-radius: 8px;
      color: var(--text); font-size: 18px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .qty-num { font-size: 15px; font-weight: 700; min-width: 20px; text-align: center; }
    .cart-footer { margin-top: 16px; }
    .cart-total {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px; font-weight: 600;
    }
    .cart-total-amount { font-size: 20px; color: var(--link); font-weight: 700; }
    .checkout-btn {
      width: 100%; background: var(--accent); color: var(--accent-fg);
      border: none; border-radius: var(--radius); padding: 15px;
      font-size: 16px; font-weight: 700; cursor: pointer;
      transition: opacity .15s;
    }
    .checkout-btn:active { opacity: .8; }
    .checkout-btn:disabled { opacity: .5; cursor: default; }
    .cart-empty { text-align: center; color: var(--hint); padding: 30px 0; font-size: 14px; }

    /* Loader */
    .loader {
      display: flex; align-items: center; justify-content: center; height: 200px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    .toast {
      position: fixed; bottom: 90px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(30,30,40,.95); color: #fff;
      padding: 10px 20px; border-radius: 99px;
      font-size: 13px; font-weight: 600;
      opacity: 0; pointer-events: none;
      transition: all .25s; z-index: 300; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--hint); }
    .empty-state-icon { font-size: 48px; margin-bottom: 12px; }
  </style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <span class="store-title">🛍️ Boutique</span>
    <button class="cart-btn" id="cartBtn" aria-label="Panier">
      🛒
      <span class="cart-badge" id="cartBadge">0</span>
    </button>
  </div>
  <div class="search-bar">
    <span style="color:var(--hint)">🔍</span>
    <input type="text" id="searchInput" placeholder="Rechercher un produit…" autocomplete="off" />
  </div>
</header>

<div class="cats-scroll" id="catsContainer">
  <div class="cat-chip active" data-cat="all">✨ Tout</div>
</div>

<main id="productsContainer">
  <div class="loader"><div class="spinner"></div></div>
</main>

<div class="toast" id="toast"></div>

<div class="cart-overlay" id="cartOverlay"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-handle"></div>
  <div class="cart-title">🛒 Mon panier</div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer">
    <div class="cart-total">
      <span>Total</span>
      <span class="cart-total-amount" id="cartTotal">0,00 €</span>
    </div>
    <button class="checkout-btn" id="checkoutBtn">Commander →</button>
  </div>
</div>

<script>
  // Telegram Web App SDK
  const tg     = window.Telegram?.WebApp;
  const tgUser = tg?.initDataUnsafe?.user || null;

  if (tg) { tg.ready(); tg.expand(); tg.enableClosingConfirmation(); }

  // Remplacer par votre URL API ou passer ?api=https://... dans l'URL
  const API_BASE = new URLSearchParams(location.search).get('api') || 'http://localhost:3000';

  let allProducts = [], activeCat = 'all';
  let cart = JSON.parse(localStorage.getItem('tg_cart') || '[]');

  const $ = id => document.getElementById(id);
  const fmt = n => Number(n).toLocaleString('fr-FR', { style: 'currency', currency: 'EUR' });

  function showToast(msg, ms = 2000) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), ms);
  }

  function cartTotal() { return cart.reduce((s, i) => s + i.price * i.qty, 0); }

  function saveCart() {
    localStorage.setItem('tg_cart', JSON.stringify(cart));
    updateCartUI();
  }

  function updateCartUI() {
    const count = cart.reduce((s, i) => s + i.qty, 0);
    const badge = $('cartBadge');
    badge.textContent = count;
    badge.classList.toggle('visible', count > 0);
    $('cartTotal').textContent = fmt(cartTotal());

    if (tg) {
      if (count > 0) {
        tg.MainButton.setText(`🛒 Panier · ${fmt(cartTotal())}`);
        tg.MainButton.show();
      } else {
        tg.MainButton.hide();
      }
    }
    renderCartItems();
  }

  function renderCartItems() {
    const el = $('cartItems');
    if (!cart.length) {
      el.innerHTML = '<div class="cart-empty">🧺 Votre panier est vide</div>';
      $('checkoutBtn').disabled = true;
      return;
    }
    $('checkoutBtn').disabled = false;
    el.innerHTML = cart.map(item => `
      <div class="cart-item">
        <img src="${item.image_url}" alt="" loading="lazy"
          onerror="this.src='https://placehold.co/52x52/333/666?text=?'">
        <div class="cart-item-info">
          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-price">${fmt(item.price)} / unité</div>
        </div>
        <div class="qty-controls">
          <button class="qty-btn" onclick="changeQty(${item.id}, -1)">−</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qty-btn" onclick="changeQty(${item.id}, +1)">+</button>
        </div>
      </div>
    `).join('');
  }

  function changeQty(id, d) {
    const i = cart.findIndex(x => x.id === id);
    if (i === -1) return;
    cart[i].qty += d;
    if (cart[i].qty <= 0) cart.splice(i, 1);
    saveCart();
  }

  function addToCart(p) {
    const i = cart.findIndex(x => x.id === p.id);
    i > -1 ? cart[i].qty++ : cart.push({ ...p, qty: 1 });
    saveCart();
    showToast(`✅ ${p.name} ajouté !`);
    tg?.HapticFeedback?.impactOccurred('light');
  }

  function openCart() {
    renderCartItems();
    $('cartOverlay').classList.add('open');
    $('cartDrawer').classList.add('open');
    tg?.BackButton.show();
  }

  function closeCart() {
    $('cartOverlay').classList.remove('open');
    $('cartDrawer').classList.remove('open');
    tg?.BackButton.hide();
  }

  $('cartBtn').addEventListener('click', openCart);
  $('cartOverlay').addEventListener('click', closeCart);
  tg?.MainButton.onClick(openCart);
  tg?.BackButton.onClick(closeCart);

  $('checkoutBtn').addEventListener('click', async () => {
    if (!cart.length) return;
    $('checkoutBtn').disabled = true;
    $('checkoutBtn').textContent = '⏳ Traitement…';

    try {
      const res = await fetch(`${API_BASE}/api/order`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          tg_user_id: tgUser?.id || 0,
          items: cart.map(i => ({ id: i.id, name: i.name, price: i.price, qty: i.qty })),
          total: cartTotal()
        })
      });
      const data = await res.json();

      if (data.success) {
        cart = []; saveCart(); closeCart();
        showToast('🎉 Commande confirmée !', 3500);
        tg?.HapticFeedback?.notificationOccurred('success');
        tg?.showAlert(`✅ Commande #${data.order_id} passée avec succès !\nVous allez recevoir une confirmation sur Telegram.`);
      } else throw new Error(data.error);
    } catch (e) {
      showToast('❌ ' + (e.message || 'Erreur réseau'), 3000);
      tg?.HapticFeedback?.notificationOccurred('error');
    } finally {
      $('checkoutBtn').disabled = false;
      $('checkoutBtn').textContent = 'Commander →';
    }
  });

  async function loadProducts() {
    try {
      const res = await fetch(`${API_BASE}/api/products`);
      allProducts = await res.json();
    } catch {
      // Mode démo si API inaccessible
      allProducts = [
        { id:1, name:'iPhone 15 Pro', description:'Titane. Le plus pro.', price:1299, image_url:'https://images.unsplash.com/photo-1695048133142-1a20484d2569?w=400', category_name:'Électronique', category_emoji:'📱' },
        { id:2, name:'AirPods Pro 2', description:'Réduction de bruit active.', price:279, image_url:'https://images.unsplash.com/photo-1600294037681-c80b4cb5b434?w=400', category_name:'Électronique', category_emoji:'📱' },
        { id:3, name:'MacBook Air M3', description:'Puissant et silencieux.', price:1299, image_url:'https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=400', category_name:'Électronique', category_emoji:'📱' },
        { id:4, name:'Sneakers Urban', description:'Style minimaliste, confort max.', price:129, image_url:'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400', category_name:'Mode', category_emoji:'👗' },
        { id:5, name:'Hoodie Premium', description:'Coton brossé 400g oversized.', price:89, image_url:'https://images.unsplash.com/photo-1556821840-3a63f15732ce?w=400', category_name:'Mode', category_emoji:'👗' },
        { id:6, name:'Montre Classique', description:'Mouvement automatique.', price:349, image_url:'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400', category_name:'Mode', category_emoji:'👗' },
        { id:7, name:'Lampe Neon LED', description:'RGB 16M couleurs.', price:59, image_url:'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=400', category_name:'Maison', category_emoji:'🏠' },
        { id:8, name:'Cafetière Espresso', description:'15 bars de pression.', price:199, image_url:'https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=400', category_name:'Maison', category_emoji:'🏠' },
        { id:9, name:'Diffuseur Huiles', description:'Aromathérapie 500ml.', price:45, image_url:'https://images.unsplash.com/photo-1603006905003-be475563bc59?w=400', category_name:'Maison', category_emoji:'🏠' },
      ];
    }
    buildCats();
    renderProducts(allProducts);
    updateCartUI();

    // Auto-ajout depuis URL ?product=ID
    const pid = new URLSearchParams(location.search).get('product');
    if (pid) { const p = allProducts.find(x => x.id == pid); if (p) addToCart(p); }
  }

  function buildCats() {
    const seen = new Map();
    allProducts.forEach(p => { if (!seen.has(p.category_name)) seen.set(p.category_name, p); });
    const container = $('catsContainer');
    seen.forEach((p, name) => {
      const chip = document.createElement('div');
      chip.className = 'cat-chip';
      chip.dataset.cat = name;
      chip.textContent = `${p.category_emoji} ${name}`;
      chip.addEventListener('click', () => setFilter(name));
      container.appendChild(chip);
    });
  }

  function setFilter(cat) {
    activeCat = cat;
    document.querySelectorAll('.cat-chip').forEach(c =>
      c.classList.toggle('active', c.dataset.cat === cat || (cat === 'all' && c.dataset.cat === 'all'))
    );
    applyFilters();
  }

  function applyFilters() {
    const q = $('searchInput').value.trim().toLowerCase();
    const res = allProducts.filter(p => {
      const cat = activeCat === 'all' || p.category_name === activeCat;
      const txt = !q || p.name.toLowerCase().includes(q) || (p.description||'').toLowerCase().includes(q);
      return cat && txt;
    });
    renderProducts(res);
  }

  function renderProducts(products) {
    const el = $('productsContainer');
    if (!products.length) {
      el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔍</div><div>Aucun produit trouvé</div></div>';
      return;
    }
    el.innerHTML = `<div class="products-grid">${products.map((p, i) => `
      <div class="product-card" style="animation-delay:${i * 0.04}s">
        <img class="product-img" src="${p.image_url}" alt="${p.name}" loading="lazy"
          onerror="this.src='https://placehold.co/200x200/222/666?text=Image'">
        <div class="product-info">
          <div class="product-name">${p.name}</div>
          <div class="product-price">${fmt(p.price)}</div>
          <button class="product-add-btn" onclick='addToCart(${JSON.stringify(p)})'>+ Ajouter</button>
        </div>
      </div>
    `).join('')}</div>`;
  }

  $('catsContainer').querySelector('[data-cat="all"]').addEventListener('click', () => setFilter('all'));

  let st;
  $('searchInput').addEventListener('input', () => { clearTimeout(st); st = setTimeout(applyFilters, 200); });

  loadProducts();
</script>
</body>
</html>
