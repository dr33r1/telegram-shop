<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>Boutique</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:       var(--tg-theme-bg-color,#0f0f11);
      --surface:  var(--tg-theme-secondary-bg-color,#1a1a1f);
      --text:     var(--tg-theme-text-color,#f0f0f0);
      --hint:     var(--tg-theme-hint-color,#888);
      --accent:   var(--tg-theme-button-color,#6366f1);
      --accentfg: var(--tg-theme-button-text-color,#fff);
      --link:     var(--tg-theme-link-color,#818cf8);
      --radius:   14px;
    }
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:15px;line-height:1.5;min-height:100dvh;padding-bottom:90px}

    /* ── Header ── */
    .header{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid rgba(255,255,255,.07);padding:12px 16px}
    .header-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
    .store-title{font-size:20px;font-weight:800;flex:1}
    .cart-btn{position:relative;background:var(--surface);border:none;border-radius:50%;width:42px;height:42px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;transition:transform .15s}
    .cart-btn:active{transform:scale(.88)}
    .cart-badge{position:absolute;top:-4px;right:-4px;background:#ef4444;color:#fff;border-radius:99px;font-size:10px;font-weight:800;padding:1px 5px;min-width:18px;text-align:center;display:none}
    .cart-badge.on{display:block}
    .search-bar{display:flex;align-items:center;background:var(--surface);border-radius:10px;padding:8px 12px;gap:8px}
    .search-bar input{background:none;border:none;outline:none;color:var(--text);font-size:15px;width:100%}
    .search-bar input::placeholder{color:var(--hint)}

    /* ── Categories ── */
    .cats{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;scrollbar-width:none}
    .cats::-webkit-scrollbar{display:none}
    .chip{display:flex;align-items:center;gap:5px;background:var(--surface);border:1.5px solid transparent;border-radius:99px;padding:6px 14px;cursor:pointer;white-space:nowrap;font-size:13px;font-weight:600;transition:all .2s;user-select:none}
    .chip.on{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--link)}

    /* ── Product grid ── */
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:0 16px}
    .card{background:var(--surface);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform .18s;animation:up .3s ease both}
    .card:active{transform:scale(.96)}
    @keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .card img{width:100%;aspect-ratio:1;object-fit:cover;background:#222}
    .card-body{padding:10px}
    .card-name{font-size:13px;font-weight:700;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:4px}
    .card-price{font-size:16px;font-weight:800;color:var(--link)}
    .card-btn{display:block;width:100%;margin-top:8px;background:var(--accent);color:var(--accentfg);border:none;border-radius:8px;padding:8px;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s}
    .card-btn:active{opacity:.7}

    /* ── Loader ── */
    .loader{display:flex;align-items:center;justify-content:center;height:200px}
    .spin{width:34px;height:34px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── Empty ── */
    .empty{text-align:center;padding:60px 20px;color:var(--hint)}
    .empty-icon{font-size:44px;margin-bottom:10px}

    /* ── Toast ── */
    .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(16px);background:rgba(20,20,30,.96);color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;font-weight:700;opacity:0;pointer-events:none;transition:all .25s;z-index:300;white-space:nowrap}
    .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

    /* ── Drawer (panier + commande) ── */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s}
    .overlay.on{opacity:1;pointer-events:all}
    .drawer{position:fixed;left:0;right:0;bottom:0;z-index:101;background:var(--surface);border-radius:22px 22px 0 0;padding:0;transform:translateY(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);max-height:88dvh;display:flex;flex-direction:column}
    .drawer.on{transform:translateY(0)}
    .drawer-handle{width:40px;height:4px;background:rgba(255,255,255,.18);border-radius:99px;margin:14px auto 0}
    .drawer-header{padding:14px 18px 12px;border-bottom:1px solid rgba(255,255,255,.07)}
    .drawer-title{font-size:17px;font-weight:800}
    .drawer-body{overflow-y:auto;flex:1;padding:16px 18px}
    .drawer-footer{padding:14px 18px;border-top:1px solid rgba(255,255,255,.07);flex-shrink:0}

    /* ── Cart items ── */
    .ci{display:flex;align-items:center;gap:12px;margin-bottom:12px}
    .ci img{width:54px;height:54px;border-radius:10px;object-fit:cover;flex-shrink:0;background:#333}
    .ci-info{flex:1}
    .ci-name{font-size:13px;font-weight:700;margin-bottom:2px}
    .ci-price{font-size:12px;color:var(--hint)}
    .qty{display:flex;align-items:center;gap:8px}
    .qty-btn{width:30px;height:30px;background:var(--bg);border:none;border-radius:8px;color:var(--text);font-size:19px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .qty-n{font-size:15px;font-weight:800;min-width:22px;text-align:center}

    /* ── Total row ── */
    .total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-weight:700;font-size:15px}
    .total-amt{font-size:22px;font-weight:900;color:var(--link)}

    /* ── Main button ── */
    .main-btn{width:100%;background:var(--accent);color:var(--accentfg);border:none;border-radius:var(--radius);padding:15px;font-size:16px;font-weight:800;cursor:pointer;transition:opacity .15s;letter-spacing:.2px}
    .main-btn:active{opacity:.8}
    .main-btn:disabled{opacity:.45;cursor:default}

    /* ── Step tabs ── */
    .steps{display:flex;gap:0;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:18px}
    .step-tab{flex:1;text-align:center;padding:10px;font-size:13px;font-weight:700;color:var(--hint);border-bottom:2px solid transparent;transition:all .2s;cursor:default}
    .step-tab.on{color:var(--link);border-bottom-color:var(--accent)}

    /* ── Delivery choice ── */
    .delivery-opts{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
    .dopt{display:flex;align-items:center;gap:14px;background:var(--bg);border:2px solid rgba(255,255,255,.1);border-radius:var(--radius);padding:16px;cursor:pointer;transition:border-color .2s}
    .dopt.on{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 10%,transparent)}
    .dopt-icon{font-size:28px;flex-shrink:0}
    .dopt-label{font-size:15px;font-weight:700}
    .dopt-sub{font-size:12px;color:var(--hint);margin-top:2px}

    /* ── Form fields ── */
    .fgroup{margin-bottom:14px}
    .fgroup label{display:block;font-size:11px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
    .fgroup input,.fgroup textarea,.fgroup select{width:100%;background:var(--bg);border:1.5px solid rgba(255,255,255,.1);border-radius:10px;padding:11px 13px;color:var(--text);font-size:14px;outline:none;font-family:inherit;transition:border-color .2s}
    .fgroup input:focus,.fgroup textarea:focus{border-color:var(--accent)}
    .frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}

    /* ── Success ── */
    .success-screen{text-align:center;padding:40px 20px}
    .success-icon{font-size:64px;margin-bottom:16px;animation:pop .4s cubic-bezier(.36,.07,.19,.97)}
    @keyframes pop{0%{transform:scale(0)}80%{transform:scale(1.15)}100%{transform:scale(1)}}
    .success-title{font-size:22px;font-weight:900;margin-bottom:8px}
    .success-sub{color:var(--hint);font-size:14px;line-height:1.6}
    .success-num{font-size:32px;font-weight:900;color:var(--link);margin:16px 0}
  </style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-top">
    <span class="store-title">🛍️ Boutique</span>
    <button class="cart-btn" id="cartBtn">🛒<span class="cart-badge" id="badge">0</span></button>
  </div>
  <div class="search-bar">
    <span style="color:var(--hint)">🔍</span>
    <input type="text" id="search" placeholder="Rechercher…" autocomplete="off"/>
  </div>
</header>

<!-- Categories -->
<div class="cats" id="cats">
  <div class="chip on" data-cat="">✨ Tout</div>
</div>

<!-- Products -->
<main id="main"><div class="loader"><div class="spin"></div></div></main>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Overlay -->
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>

<!-- Drawer -->
<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-header">
    <div class="drawer-title" id="drawerTitle">🛒 Mon panier</div>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
  <div class="drawer-footer" id="drawerFooter"></div>
</div>

<script>
// ── Init Telegram ──────────────────────────────────────────────────────────
const tg     = window.Telegram?.WebApp;
const tgUser = tg?.initDataUnsafe?.user || null;
if (tg) { tg.ready(); tg.expand(); tg.enableClosingConfirmation(); }

const API = new URLSearchParams(location.search).get('api') || 'http://localhost:3000';

// ── State ──────────────────────────────────────────────────────────────────
let products = [], activeCat = '', cart = JSON.parse(localStorage.getItem('tg_cart')||'[]');
let drawerMode = 'cart'; // 'cart' | 'checkout' | 'success'
let deliveryMode = ''; // 'pickup' | 'delivery'

// ── Helpers ────────────────────────────────────────────────────────────────
const $  = id => document.getElementById(id);
const fmt = n  => Number(n).toLocaleString('fr-FR',{style:'currency',currency:'EUR'});

function toast(msg, ms=2200) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), ms);
}

function cartTotal() { return cart.reduce((s,i) => s+i.price*i.qty, 0); }
function cartCount() { return cart.reduce((s,i) => s+i.qty, 0); }

function saveCart() {
  localStorage.setItem('tg_cart', JSON.stringify(cart));
  const c = cartCount();
  $('badge').textContent = c;
  $('badge').classList.toggle('on', c > 0);
  if (tg) {
    if (c > 0) { tg.MainButton.setText(`🛒 Panier · ${fmt(cartTotal())}`); tg.MainButton.show(); }
    else tg.MainButton.hide();
  }
}

function addToCart(p) {
  const i = cart.findIndex(x => x.id === p.id);
  i > -1 ? cart[i].qty++ : cart.push({...p, qty:1});
  saveCart();
  toast(`✅ ${p.name} ajouté !`);
  tg?.HapticFeedback?.impactOccurred('light');
}

function changeQty(id, d) {
  const i = cart.findIndex(x => x.id === id);
  if (i === -1) return;
  cart[i].qty += d;
  if (cart[i].qty <= 0) cart.splice(i, 1);
  saveCart();
  if (drawerMode === 'cart') renderCart();
}

// ── Drawer ─────────────────────────────────────────────────────────────────
function openDrawer(mode='cart') {
  drawerMode = mode;
  $('overlay').classList.add('on');
  $('drawer').classList.add('on');
  if (mode === 'cart') renderCart();
  tg?.BackButton.show();
}

function closeDrawer() {
  $('overlay').classList.remove('on');
  $('drawer').classList.remove('on');
  tg?.BackButton.hide();
  deliveryMode = '';
}

$('cartBtn').addEventListener('click', () => openDrawer('cart'));
tg?.MainButton.onClick(() => openDrawer('cart'));
tg?.BackButton.onClick(() => {
  if (drawerMode === 'checkout') { openDrawer('cart'); }
  else closeDrawer();
});

// ── Panier ─────────────────────────────────────────────────────────────────
function renderCart() {
  drawerMode = 'cart';
  $('drawerTitle').textContent = '🛒 Mon panier';

  if (!cart.length) {
    $('drawerBody').innerHTML = `<div class="empty"><div class="empty-icon">🧺</div><div>Votre panier est vide</div></div>`;
    $('drawerFooter').innerHTML = '';
    return;
  }

  $('drawerBody').innerHTML = cart.map(item => `
    <div class="ci">
      <img src="${item.image_url||''}" onerror="this.src=''" alt="">
      <div class="ci-info">
        <div class="ci-name">${item.name}</div>
        <div class="ci-price">${fmt(item.price)} / unité · <strong>${fmt(item.price*item.qty)}</strong></div>
      </div>
      <div class="qty">
        <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
        <span class="qty-n">${item.qty}</span>
        <button class="qty-btn" onclick="changeQty(${item.id},+1)">+</button>
      </div>
    </div>
  `).join('');

  $('drawerFooter').innerHTML = `
    <div class="total-row">
      <span>Total</span>
      <span class="total-amt">${fmt(cartTotal())}</span>
    </div>
    <button class="main-btn" onclick="openCheckout()">Passer la commande →</button>
  `;
}

// ── Checkout ───────────────────────────────────────────────────────────────
function openCheckout() {
  drawerMode = 'checkout';
  deliveryMode = '';
  $('drawerTitle').textContent = '📋 Finaliser la commande';

  $('drawerBody').innerHTML = `
    <!-- Récap commande -->
    <div style="background:var(--bg);border-radius:10px;padding:12px;margin-bottom:18px">
      <div style="font-size:12px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Votre commande</div>
      ${cart.map(i=>`
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
          <span>${i.name} <span style="color:var(--hint)">×${i.qty}</span></span>
          <span style="font-weight:700">${fmt(i.price*i.qty)}</span>
        </div>
      `).join('')}
      <div style="border-top:1px solid rgba(255,255,255,.08);margin-top:8px;padding-top:8px;display:flex;justify-content:space-between;font-weight:800;font-size:15px">
        <span>Total</span><span style="color:var(--link)">${fmt(cartTotal())}</span>
      </div>
    </div>

    <!-- Choix livraison -->
    <div style="font-size:12px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">Mode de récupération</div>
    <div class="delivery-opts">
      <div class="dopt" id="opt-pickup" onclick="selectDelivery('pickup')">
        <div class="dopt-icon">🏪</div>
        <div>
          <div class="dopt-label">Sur place</div>
          <div class="dopt-sub">Récupérer en magasin</div>
        </div>
      </div>
      <div class="dopt" id="opt-delivery" onclick="selectDelivery('delivery')">
        <div class="dopt-icon">📦</div>
        <div>
          <div class="dopt-label">Livraison / Envoi</div>
          <div class="dopt-sub">Livraison à domicile ou envoi postal</div>
        </div>
      </div>
    </div>

    <!-- Formulaire (caché jusqu'au choix) -->
    <div id="delivery-form" style="display:none">
      <div style="font-size:12px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px">Vos coordonnées</div>

      <div id="pickup-fields">
        <div class="fgroup">
          <label>Nom complet *</label>
          <input id="f-name" type="text" placeholder="Jean Dupont"/>
        </div>
        <div class="fgroup">
          <label>Téléphone *</label>
          <input id="f-phone" type="tel" placeholder="+33 6 00 00 00 00"/>
        </div>
        <div class="fgroup">
          <label>Message / Note</label>
          <textarea id="f-note" placeholder="Heure de passage souhaitée, demande spéciale…" style="min-height:70px"></textarea>
        </div>
      </div>

      <div id="delivery-fields" style="display:none">
        <div class="frow">
          <div class="fgroup">
            <label>Prénom *</label>
            <input id="f-firstname" type="text" placeholder="Jean"/>
          </div>
          <div class="fgroup">
            <label>Nom *</label>
            <input id="f-lastname" type="text" placeholder="Dupont"/>
          </div>
        </div>
        <div class="fgroup">
          <label>Adresse *</label>
          <input id="f-address" type="text" placeholder="12 rue de la Paix"/>
        </div>
        <div class="frow">
          <div class="fgroup">
            <label>Code postal *</label>
            <input id="f-zip" type="text" placeholder="75001"/>
          </div>
          <div class="fgroup">
            <label>Ville *</label>
            <input id="f-city" type="text" placeholder="Paris"/>
          </div>
        </div>
        <div class="fgroup">
          <label>Téléphone *</label>
          <input id="f-phone2" type="tel" placeholder="+33 6 00 00 00 00"/>
        </div>
        <div class="fgroup">
          <label>Message / Instructions</label>
          <textarea id="f-note2" placeholder="Digicode, étage, instructions particulières…" style="min-height:70px"></textarea>
        </div>
      </div>
    </div>
  `;

  $('drawerFooter').innerHTML = `
    <button class="main-btn" id="confirmBtn" onclick="confirmOrder()" disabled>
      Choisir un mode de récupération
    </button>
  `;
}

function selectDelivery(mode) {
  deliveryMode = mode;
  document.querySelectorAll('.dopt').forEach(d => d.classList.remove('on'));
  $('opt-' + mode).classList.add('on');
  $('delivery-form').style.display = 'block';

  if (mode === 'pickup') {
    $('pickup-fields').style.display = 'block';
    $('delivery-fields').style.display = 'none';
  } else {
    $('pickup-fields').style.display = 'none';
    $('delivery-fields').style.display = 'block';
  }

  const btn = $('confirmBtn');
  btn.textContent = mode === 'pickup' ? '✅ Confirmer ma commande' : '📦 Confirmer et livrer';
  btn.disabled = false;
}

// ── Confirmation & envoi ───────────────────────────────────────────────────
async function confirmOrder() {
  if (!deliveryMode) return;

  // Collecte et validation des champs
  let clientInfo = {};
  if (deliveryMode === 'pickup') {
    const name  = ($('f-name')?.value||'').trim();
    const phone = ($('f-phone')?.value||'').trim();
    if (!name || !phone) return toast('Nom et téléphone obligatoires', 2500);
    clientInfo = { name, phone, note: ($('f-note')?.value||'').trim() };
  } else {
    const firstname = ($('f-firstname')?.value||'').trim();
    const lastname  = ($('f-lastname')?.value||'').trim();
    const address   = ($('f-address')?.value||'').trim();
    const zip       = ($('f-zip')?.value||'').trim();
    const city      = ($('f-city')?.value||'').trim();
    const phone     = ($('f-phone2')?.value||'').trim();
    if (!firstname||!lastname||!address||!zip||!city||!phone)
      return toast('Veuillez remplir tous les champs obligatoires', 2500);
    clientInfo = { firstname, lastname, address, zip, city, phone, note: ($('f-note2')?.value||'').trim() };
  }

  const btn = $('confirmBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Envoi en cours…';

  try {
    const payload = {
      tg_user_id:    tgUser?.id || 0,
      tg_username:   tgUser?.username || '',
      tg_first_name: tgUser?.first_name || '',
      items:         cart.map(i => ({ id:i.id, name:i.name, price:i.price, qty:i.qty })),
      total:         cartTotal(),
      delivery_mode: deliveryMode,
      client_info:   clientInfo,
    };

    const res  = await fetch(`${API}/api/order`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();

    if (data.success) {
      const orderId = data.order_id;
      cart = [];
      saveCart();
      tg?.HapticFeedback?.notificationOccurred('success');
      renderSuccess(orderId);
    } else throw new Error(data.error || 'Erreur inconnue');
  } catch(e) {
    toast('❌ ' + e.message, 3000);
    tg?.HapticFeedback?.notificationOccurred('error');
    btn.disabled = false;
    btn.textContent = deliveryMode === 'pickup' ? '✅ Confirmer ma commande' : '📦 Confirmer et livrer';
  }
}

function renderSuccess(orderId) {
  drawerMode = 'success';
  $('drawerTitle').textContent = '';
  $('drawerBody').innerHTML = `
    <div class="success-screen">
      <div class="success-icon">🎉</div>
      <div class="success-title">Commande confirmée !</div>
      <div class="success-num">#${orderId}</div>
      <div class="success-sub">
        Vous allez recevoir un récapitulatif complet<br>directement dans ce chat Telegram.<br><br>
        ${deliveryMode === 'pickup'
          ? 'Nous vous contacterons pour confirmer l\'heure de passage. 🏪'
          : 'Nous préparons votre colis et vous tiendrons informé. 📦'}
      </div>
    </div>
  `;
  $('drawerFooter').innerHTML = `
    <button class="main-btn" onclick="closeDrawer()">Retour à la boutique</button>
  `;
  tg?.BackButton.hide();
}

// ── Produits ───────────────────────────────────────────────────────────────
async function loadProducts() {
  try {
    const r = await fetch(`${API}/api/products`);
    products = await r.json();
  } catch {
    products = getDemoProducts();
  }
  buildCats();
  renderProducts(products);
  saveCart();

  const pid = new URLSearchParams(location.search).get('product');
  if (pid) { const p = products.find(x => x.id == pid); if (p) addToCart(p); }
}

function getDemoProducts() {
  return [

function buildCats() {
  const seen = new Map();
  products.forEach(p => { if (!seen.has(p.category_name)) seen.set(p.category_name, p); });
  const c = $('cats');
  seen.forEach((p, name) => {
    const el = document.createElement('div');
    el.className  = 'chip';
    el.dataset.cat = name;
    el.textContent = `${p.category_emoji} ${name}`;
    el.addEventListener('click', () => setFilter(name));
    c.appendChild(el);
  });
}

function setFilter(cat) {
  activeCat = cat;
  document.querySelectorAll('.chip').forEach(c =>
    c.classList.toggle('on', c.dataset.cat === cat || (!cat && c.dataset.cat === ''))
  );
  applyFilter();
}

function applyFilter() {
  const q = $('search').value.trim().toLowerCase();
  renderProducts(products.filter(p => {
    const matchCat = !activeCat || p.category_name === activeCat;
    const matchQ   = !q || p.name.toLowerCase().includes(q) || (p.description||'').toLowerCase().includes(q);
    return matchCat && matchQ;
  }));
}

function renderProducts(list) {
  const el = $('main');
  if (!list.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div style="color:var(--hint)">Aucun produit trouvé</div></div>`;
    return;
  }
  el.innerHTML = `<div class="grid">${list.map((p,i) => `
    <div class="card" style="animation-delay:${i*.04}s">
      <img src="${p.image_url}" alt="${p.name}" loading="lazy" onerror="this.src=''">
      <div class="card-body">
        <div class="card-name">${p.name}</div>
        <div class="card-price">${fmt(p.price)}</div>
        <button class="card-btn" onclick='addToCart(${JSON.stringify(p)})'>+ Ajouter</button>
      </div>
    </div>
  `).join('')}</div>`;
}

$('cats').querySelector('[data-cat=""]').addEventListener('click', () => setFilter(''));
let st;
$('search').addEventListener('input', () => { clearTimeout(st); st = setTimeout(applyFilter, 200); });

loadProducts();
