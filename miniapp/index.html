<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>Coffee10</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:       var(--tg-theme-bg-color,#0f0f11);
      --surface:  var(--tg-theme-secondary-bg-color,#1a1a1f);
      --text:     var(--tg-theme-text-color,#f0f0f0);
      --hint:     var(--tg-theme-hint-color,#888);
      --accent:   var(--tg-theme-button-color,#6366f1);
      --accentfg: var(--tg-theme-button-text-color,#fff);
      --link:     var(--tg-theme-link-color,#818cf8);
      --radius:   14px;
    }
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:15px;line-height:1.5;min-height:100dvh;padding-bottom:90px}

    /* Header */
    .header{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid rgba(255,255,255,.07);padding:12px 16px}
    .header-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
    .store-title{font-size:20px;font-weight:800;flex:1}
    .cart-btn{position:relative;background:var(--surface);border:none;border-radius:50%;width:42px;height:42px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;transition:transform .15s}
    .cart-btn:active{transform:scale(.88)}
    .cart-badge{position:absolute;top:-4px;right:-4px;background:#ef4444;color:#fff;border-radius:99px;font-size:10px;font-weight:800;padding:1px 5px;min-width:18px;text-align:center;display:none}
    .cart-badge.on{display:block}
    .search-bar{display:flex;align-items:center;background:var(--surface);border-radius:10px;padding:8px 12px;gap:8px}
    .search-bar input{background:none;border:none;outline:none;color:var(--text);font-size:15px;width:100%}
    .search-bar input::placeholder{color:var(--hint)}

    /* Categories */
    .cats{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;scrollbar-width:none}
    .cats::-webkit-scrollbar{display:none}
    .chip{display:flex;align-items:center;gap:5px;background:var(--surface);border:1.5px solid transparent;border-radius:99px;padding:6px 14px;cursor:pointer;white-space:nowrap;font-size:13px;font-weight:600;transition:all .2s;user-select:none}
    .chip.on{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--link)}

    /* Product grid */
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:0 16px}
    .card{background:var(--surface);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform .18s;animation:up .3s ease both}
    .card:active{transform:scale(.96)}
    @keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .card img{width:100%;aspect-ratio:1;object-fit:cover;background:#222}
    .card-body{padding:10px}
    .card-name{font-size:13px;font-weight:700;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:4px}
    .card-price{font-size:16px;font-weight:800;color:var(--link)}
    .card-btn{display:block;width:100%;margin-top:8px;background:var(--accent);color:var(--accentfg);border:none;border-radius:8px;padding:8px;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s}
    .card-btn:active{opacity:.7}

    /* Loader / empty */
    .loader{display:flex;align-items:center;justify-content:center;height:200px}
    .spin{width:34px;height:34px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty{text-align:center;padding:60px 20px;color:var(--hint)}

    /* Toast */
    .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(16px);background:rgba(20,20,30,.96);color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;font-weight:700;opacity:0;pointer-events:none;transition:all .25s;z-index:400;white-space:nowrap}
    .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

    /* Overlay + Drawer */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s}
    .overlay.on{opacity:1;pointer-events:all}
    .drawer{position:fixed;left:0;right:0;bottom:0;z-index:101;background:var(--surface);border-radius:22px 22px 0 0;transform:translateY(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);max-height:92dvh;display:flex;flex-direction:column}
    .drawer.on{transform:translateY(0)}
    .drawer-handle{width:40px;height:4px;background:rgba(255,255,255,.18);border-radius:99px;margin:14px auto 0;flex-shrink:0}
    .drawer-head{padding:14px 18px 12px;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0;display:flex;align-items:center;gap:10px}
    .drawer-back{background:none;border:none;color:var(--hint);font-size:22px;cursor:pointer;padding:0;line-height:1;flex-shrink:0}
    .drawer-title{font-size:17px;font-weight:800;flex:1}
    .drawer-body{overflow-y:auto;flex:1;padding:16px 18px}
    .drawer-foot{padding:14px 18px;border-top:1px solid rgba(255,255,255,.07);flex-shrink:0}

    /* Cart items */
    .ci{display:flex;align-items:center;gap:12px;margin-bottom:12px}
    .ci img{width:54px;height:54px;border-radius:10px;object-fit:cover;flex-shrink:0;background:#333}
    .ci-info{flex:1}
    .ci-name{font-size:13px;font-weight:700;margin-bottom:2px}
    .ci-price{font-size:12px;color:var(--hint)}
    .qty{display:flex;align-items:center;gap:8px}
    .qty-btn{width:30px;height:30px;background:var(--bg);border:none;border-radius:8px;color:var(--text);font-size:19px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .qty-n{font-size:15px;font-weight:800;min-width:22px;text-align:center}

    /* Total */
    .total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-weight:700}
    .total-amt{font-size:22px;font-weight:900;color:var(--link)}

    /* Main action btn */
    .abtn{width:100%;border:none;border-radius:var(--radius);padding:15px;font-size:16px;font-weight:800;cursor:pointer;transition:opacity .15s;letter-spacing:.1px}
    .abtn:active{opacity:.75}
    .abtn:disabled{opacity:.4;cursor:default}
    .abtn-primary{background:var(--accent);color:var(--accentfg)}
    .abtn-ghost{background:rgba(255,255,255,.08);color:var(--text);margin-top:8px}

    /* Section label */
    .slabel{font-size:11px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}

    /* Recap box */
    .recap{background:var(--bg);border-radius:12px;padding:14px;margin-bottom:20px}
    .recap-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px}
    .recap-row:last-child{margin-bottom:0;padding-top:8px;border-top:1px solid rgba(255,255,255,.07);font-weight:800;font-size:15px}

    /* Mode cards */
    .modes{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
    .mcard{display:flex;align-items:center;gap:14px;background:var(--bg);border:2px solid rgba(255,255,255,.1);border-radius:var(--radius);padding:16px;cursor:pointer;transition:border-color .2s,background .2s}
    .mcard:active{transform:scale(.98)}
    .mcard.on{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 10%,transparent)}
    .mcard-icon{font-size:30px;flex-shrink:0}
    .mcard-title{font-size:15px;font-weight:700;margin-bottom:2px}
    .mcard-sub{font-size:12px;color:var(--hint)}

    /* Form fields */
    .fgroup{margin-bottom:12px}
    .fgroup label{display:block;font-size:11px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
    .fgroup input{width:100%;background:var(--bg);border:1.5px solid rgba(255,255,255,.1);border-radius:10px;padding:11px 13px;color:var(--text);font-size:14px;outline:none;font-family:inherit;transition:border-color .2s}
    .fgroup input:focus{border-color:var(--accent)}
    .fgroup .opt-tag{font-size:10px;color:var(--hint);font-weight:400;text-transform:none;letter-spacing:0;margin-left:4px}

    /* Share buttons */
    .share-btns{display:flex;flex-direction:column;gap:10px}
    .sbtn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;border:none;border-radius:var(--radius);padding:15px;font-size:16px;font-weight:800;cursor:pointer;transition:opacity .15s}
    .sbtn:active{opacity:.75}
    .sbtn-tg{background:#229ED9;color:#fff}
    .sbtn-wa{background:#25D366;color:#fff}
    .sbtn-icon{font-size:22px}

    /* Message preview */
    .msg-preview{background:var(--bg);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:14px;font-size:12px;line-height:1.7;color:var(--hint);white-space:pre-wrap;word-break:break-word;margin-bottom:16px;font-family:monospace;max-height:180px;overflow-y:auto}

    /* Success */
    .success{text-align:center;padding:30px 10px}
    /* Variantes */
    .var-opts{display:flex;flex-direction:column;gap:10px;padding-bottom:10px}
    .var-opt{display:flex;align-items:center;justify-content:space-between;background:var(--bg);border:2px solid rgba(255,255,255,.1);border-radius:var(--radius);padding:16px;cursor:pointer;transition:border-color .2s}
    .var-opt:active{transform:scale(.97)}
    .var-opt.selected{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 10%,transparent)}
    .var-weight{font-size:16px;font-weight:800}
    .var-price{font-size:18px;font-weight:900;color:var(--link)}
    .var-add-btn{width:100%;background:var(--accent);color:var(--accentfg);border:none;border-radius:var(--radius);padding:15px;font-size:16px;font-weight:800;cursor:pointer;margin-top:4px}
    .var-add-btn:disabled{opacity:.4;cursor:default}

    .success-icon{font-size:60px;margin-bottom:14px;animation:pop .4s cubic-bezier(.36,.07,.19,.97)}
    @keyframes pop{0%{transform:scale(0)}80%{transform:scale(1.15)}100%{transform:scale(1)}}
    .success-title{font-size:21px;font-weight:900;margin-bottom:8px}
    .success-sub{color:var(--hint);font-size:13px;line-height:1.7}
  </style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <span class="store-title">☕ Coffee10</span>
    <button class="cart-btn" id="cartBtn">🛒<span class="cart-badge" id="badge"></span></button>
  </div>
  <div class="search-bar">
    <span style="color:var(--hint)">🔍</span>
    <input type="text" id="search" placeholder="Rechercher…" autocomplete="off"/>
  </div>
</header>

<div class="cats" id="cats">
  <div class="chip on" data-cat="">✨ Tout</div>
</div>

<main id="main"><div class="loader"><div class="spin"></div></div></main>

<div class="toast" id="toast"></div>
<div class="overlay" id="overlay"></div>

<!-- Drawer variantes -->
<div class="overlay" id="varOverlay" style="z-index:110;opacity:0;pointer-events:none"></div>
<div class="drawer" id="varDrawer" style="z-index:111;max-height:70dvh">
  <div class="drawer-handle"></div>
  <div class="drawer-head">
    <div class="drawer-title" id="varTitle">Choisir le grammage</div>
  </div>
  <div class="drawer-body" id="varBody"></div>
</div>

<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-head">
    <button class="drawer-back" id="backBtn" style="display:none" onclick="goBack()">‹</button>
    <div class="drawer-title" id="drawerTitle">🛒 Mon panier</div>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
  <div class="drawer-foot" id="drawerFoot"></div>
</div>

<script>
// ── Config ─────────────────────────────────────────────────────────────────
const STORE_NAME   = 'Coffee10';
const ADMIN_TG     = 'Thecoffee10';          // sans @
const ADMIN_WA     = '33746772435';          // format international sans +
const API          = 'https://telegram-shop-coffee-10.up.railway.app';

// ── Telegram SDK ───────────────────────────────────────────────────────────
const tg     = window.Telegram?.WebApp;
const tgUser = tg?.initDataUnsafe?.user || null;
if (tg) { tg.ready(); tg.expand(); tg.enableClosingConfirmation(); }

// ── State ──────────────────────────────────────────────────────────────────
let products = [], activeCat = '';
let cart     = JSON.parse(localStorage.getItem('c10_cart') || '[]');
let step     = 'cart'; // cart | mode | form | share | success
let mode     = '';     // meetup | livraison | colis

// ── Utils ──────────────────────────────────────────────────────────────────
const $   = id => document.getElementById(id);
const fmt = n  => Number(n).toLocaleString('fr-FR', { style:'currency', currency:'EUR' });
const cartTotal = () => cart.reduce((s,i) => s + i.price * i.qty, 0);
const cartCount = () => cart.reduce((s,i) => s + i.qty, 0);

function toast(msg, ms = 2200) {
  const t = $('toast'); t.textContent = msg; t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), ms);
}

function saveCart() {
  localStorage.setItem('c10_cart', JSON.stringify(cart));
  const n = cartCount();
  const b = $('badge');
  b.textContent = n || '';
  b.classList.toggle('on', n > 0);
  if (tg) {
    n > 0
      ? (tg.MainButton.setText(`🛒 Panier · ${fmt(cartTotal())}`), tg.MainButton.show())
      : tg.MainButton.hide();
  }
}

function addToCart(p, variantWeight, variantPrice) {
  // Si variantes disponibles et pas encore choisie → ouvrir le sélecteur
  let variants = [];
  try { variants = JSON.parse(p.variants || '[]'); } catch {}

  if (variants.length > 0 && !variantWeight) {
    openVariantDrawer(p, variants);
    return;
  }

  // Construire la clé unique (produit + variante)
  const key = variantWeight ? `${p.id}_${variantWeight}` : String(p.id);
  const price = variantWeight ? variantPrice : p.price;
  const name  = variantWeight ? `${p.name} — ${variantWeight}` : p.name;

  const i = cart.findIndex(x => x._key === key);
  if (i > -1) {
    cart[i].qty++;
  } else {
    cart.push({ ...p, _key: key, name, price, qty: 1 });
  }
  saveCart();
  toast(`✅ ${name} ajouté !`);
  tg?.HapticFeedback?.impactOccurred('light');
}

let _variantProduct = null;
let _selectedVariant = null;

function openVariantDrawer(p, variants) {
  _variantProduct  = p;
  _selectedVariant = null;

  $('varTitle').textContent = p.name;
  $('varOverlay').style.opacity = '1';
  $('varOverlay').style.pointerEvents = 'all';
  $('varDrawer').style.transform = 'translateY(0)';

  $('varBody').innerHTML = `
    <div class="var-opts" id="varOpts">
      ${variants.map((v, i) => `
        <div class="var-opt" onclick="selectVariant(${i}, '${v.weight}', ${v.price})" id="vopt-${i}">
          <span class="var-weight">${v.weight}</span>
          <span class="var-price">${fmt(v.price)}</span>
        </div>
      `).join('')}
    </div>
    <button class="var-add-btn" id="varAddBtn" disabled onclick="confirmVariant()">
      Ajouter au panier
    </button>
  `;

  $('varOverlay').onclick = closeVariantDrawer;
}

function selectVariant(idx, weight, price) {
  _selectedVariant = { weight, price };
  document.querySelectorAll('.var-opt').forEach((el, i) =>
    el.classList.toggle('selected', i === idx)
  );
  const btn = $('varAddBtn');
  btn.disabled = false;
  btn.textContent = `Ajouter ${weight} — ${fmt(price)}`;
}

function confirmVariant() {
  if (!_selectedVariant || !_variantProduct) return;
  closeVariantDrawer();
  addToCart(_variantProduct, _selectedVariant.weight, _selectedVariant.price);
}

function closeVariantDrawer() {
  $('varOverlay').style.opacity = '0';
  $('varOverlay').style.pointerEvents = 'none';
  $('varDrawer').style.transform = 'translateY(100%)';
  _variantProduct = null;
  _selectedVariant = null;
}

function changeQty(id, d) {
  const i = cart.findIndex(x => x.id === id);
  if (i < 0) return;
  cart[i].qty += d;
  if (cart[i].qty <= 0) cart.splice(i, 1);
  saveCart();
  renderCart();
}

// ── Drawer open/close ──────────────────────────────────────────────────────
function openDrawer() {
  $('overlay').classList.add('on');
  $('drawer').classList.add('on');
  $('overlay').onclick = closeDrawer;
  tg?.BackButton.show();
  tg?.BackButton.onClick(goBack);
  goToStep('cart');
}

function closeDrawer() {
  $('overlay').classList.remove('on');
  $('drawer').classList.remove('on');
  tg?.BackButton.hide();
  step = 'cart'; mode = '';
}

function goBack() {
  if (step === 'mode')  { goToStep('cart'); return; }
  if (step === 'form')  { goToStep('mode'); return; }
  if (step === 'share') { goToStep('form'); return; }
  closeDrawer();
}

function goToStep(s) {
  step = s;
  const back = $('backBtn');
  back.style.display = (s === 'cart' || s === 'success') ? 'none' : 'block';
  if (s === 'cart')    renderCart();
  if (s === 'mode')    renderMode();
  if (s === 'form')    renderForm();
  if (s === 'share')   renderShare();
  if (s === 'success') renderSuccess();
}

$('cartBtn').addEventListener('click', openDrawer);
tg?.MainButton.onClick(openDrawer);

// ── ÉTAPE 1 : Panier ───────────────────────────────────────────────────────
function renderCart() {
  $('drawerTitle').textContent = '🛒 Mon panier';
  if (!cart.length) {
    $('drawerBody').innerHTML = `<div class="empty"><div style="font-size:44px">🧺</div><div style="color:var(--hint);margin-top:8px">Votre panier est vide</div></div>`;
    $('drawerFoot').innerHTML = '';
    return;
  }
  $('drawerBody').innerHTML = cart.map(item => `
    <div class="ci">
      <img src="${item.image_url||''}" onerror="this.style.opacity=0" alt="">
      <div class="ci-info">
        <div class="ci-name">${item.name}</div>
        <div class="ci-price">${fmt(item.price)} · <b>${fmt(item.price * item.qty)}</b></div>
      </div>
      <div class="qty">
        <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
        <span class="qty-n">${item.qty}</span>
        <button class="qty-btn" onclick="changeQty(${item.id},+1)">+</button>
      </div>
    </div>
  `).join('');
  $('drawerFoot').innerHTML = `
    <div class="total-row">
      <span>Total</span>
      <span class="total-amt">${fmt(cartTotal())}</span>
    </div>
    <button class="abtn abtn-primary" onclick="goToStep('mode')">Passer la commande →</button>
  `;
}

// ── ÉTAPE 2 : Choix du mode ────────────────────────────────────────────────
function renderMode() {
  $('drawerTitle').textContent = 'Mode de réception';
  $('drawerBody').innerHTML = `
    <div class="recap" style="margin-bottom:20px">
      <div class="slabel" style="margin-bottom:8px">Votre commande</div>
      ${cart.map(i=>`
        <div class="recap-row">
          <span>${i.name} <span style="color:var(--hint)">×${i.qty}</span></span>
          <span>${fmt(i.price * i.qty)}</span>
        </div>
      `).join('')}
      <div class="recap-row">
        <span>Total</span>
        <span style="color:var(--link)">${fmt(cartTotal())}</span>
      </div>
    </div>

    <div class="slabel">Comment souhaitez-vous récupérer votre commande ?</div>
    <div class="modes">
      <div class="mcard${mode==='meetup'?' on':''}" onclick="selectMode('meetup')">
        <div class="mcard-icon">🤝</div>
        <div>
          <div class="mcard-title">MeetUp</div>
          <div class="mcard-sub">On se retrouve en personne</div>
        </div>
      </div>
      <div class="mcard${mode==='livraison'?' on':''}" onclick="selectMode('livraison')">
        <div class="mcard-icon">🚗</div>
        <div>
          <div class="mcard-title">Livraison</div>
          <div class="mcard-sub">Livraison à domicile</div>
        </div>
      </div>
      <div class="mcard${mode==='colis'?' on':''}" onclick="selectMode('colis')">
        <div class="mcard-icon">📦</div>
        <div>
          <div class="mcard-title">Colis</div>
          <div class="mcard-sub">Envoi postal</div>
        </div>
      </div>
    </div>
  `;
  $('drawerFoot').innerHTML = `
    <button class="abtn abtn-primary" id="modeNext" onclick="goToStep('form')" ${mode?'':'disabled'}>
      Continuer →
    </button>
  `;
}

function selectMode(m) {
  mode = m;
  // Mettre à jour les cartes visuellement
  document.querySelectorAll('.mcard').forEach(c => c.classList.remove('on'));
  event.currentTarget.classList.add('on');
  $('modeNext').disabled = false;
  tg?.HapticFeedback?.selectionChanged();
}

// ── ÉTAPE 3 : Formulaire (ou rien pour MeetUp) ────────────────────────────
function renderForm() {
  $('drawerTitle').textContent = mode === 'meetup' ? '🤝 MeetUp' : mode === 'livraison' ? '🚗 Livraison' : '📦 Colis';

  if (mode === 'meetup') {
    // Pas de formulaire → aller directement au partage
    $('drawerBody').innerHTML = `
      <div style="text-align:center;padding:30px 10px">
        <div style="font-size:52px;margin-bottom:14px">🤝</div>
        <div style="font-size:16px;font-weight:700;margin-bottom:8px">Parfait !</div>
        <div style="color:var(--hint);font-size:14px;line-height:1.6">
          Votre commande est prête.<br>Envoyez-la pour convenir du lieu et de l'heure du MeetUp.
        </div>
      </div>
    `;
    $('drawerFoot').innerHTML = `
      <button class="abtn abtn-primary" onclick="goToStep('share')">Envoyer la commande →</button>
    `;
    return;
  }

  // Livraison ou Colis
  $('drawerBody').innerHTML = `
    <div class="slabel" style="margin-bottom:14px">Informations de ${mode === 'livraison' ? 'livraison' : 'réception du colis'}</div>

    <div class="fgroup">
      <label>Adresse <span style="color:var(--accent)">*</span></label>
      <input id="f-address" type="text" placeholder="12 rue de la Paix"/>
    </div>
    <div class="fgroup">
      <label>Bâtiment <span class="opt-tag">(optionnel)</span></label>
      <input id="f-building" type="text" placeholder="Bât A, Résidence Les Pins…"/>
    </div>
    <div class="fgroup">
      <label>Code interphone <span class="opt-tag">(optionnel)</span></label>
      <input id="f-code" type="text" placeholder="B123, 4321…"/>
    </div>
    <div class="fgroup">
      <label>Téléphone <span class="opt-tag">(optionnel)</span></label>
      <input id="f-phone" type="tel" placeholder="+33 6 00 00 00 00"/>
    </div>
  `;
  $('drawerFoot').innerHTML = `
    <button class="abtn abtn-primary" onclick="validateForm()">Préparer la commande →</button>
  `;
}

function validateForm() {
  const address = ($('f-address')?.value || '').trim();
  if (!address) { toast('⚠️ L\'adresse est obligatoire', 2200); return; }
  goToStep('share');
}

// ── ÉTAPE 4 : Partage Telegram / WhatsApp ─────────────────────────────────
function buildMessage() {
  const username = tgUser?.username ? `@${tgUser.username}` : tgUser?.first_name || 'Client';
  const lines    = cart.map(i => `• ${i.name} ×${i.qty} — ${fmt(i.price * i.qty)}`).join('\n');

  let modeBlock = '';
  if (mode === 'meetup') {
    modeBlock = '🤝 Mode : MeetUp';
  } else {
    const addr     = ($('f-address')?.value  || '').trim();
    const building = ($('f-building')?.value || '').trim();
    const code     = ($('f-code')?.value     || '').trim();
    const phone    = ($('f-phone')?.value    || '').trim();

    const label = mode === 'livraison' ? '🚗 Mode : Livraison' : '📦 Mode : Colis';
    modeBlock   = label + '\n';
    modeBlock  += `📍 ${addr}`;
    if (building) modeBlock += `\n🏢 ${building}`;
    if (code)     modeBlock += `\n🔔 Code : ${code}`;
    if (phone)    modeBlock += `\n📞 ${phone}`;
  }

  return (
    `🛍️ Commande ${STORE_NAME}\n` +
    `${'─'.repeat(28)}\n\n` +
    `${lines}\n\n` +
    `${modeBlock}\n\n` +
    `👤 ${username}\n\n` +
    `💰 Total : ${fmt(cartTotal())}`
  );
}

function renderShare() {
  $('drawerTitle').textContent = '📨 Envoyer la commande';
  const msg = buildMessage();

  $('drawerBody').innerHTML = `
    <div class="slabel" style="margin-bottom:10px">Aperçu du message</div>
    <div class="msg-preview" id="msgPreview">${msg}</div>
    <div class="slabel" style="margin-bottom:12px">Choisissez comment envoyer</div>
    <div class="share-btns">
      <button class="sbtn sbtn-tg" onclick="sendViaTelegram()">
        <span class="sbtn-icon">✈️</span> Envoyer via Telegram
      </button>
      <button class="sbtn sbtn-wa" onclick="sendViaWhatsApp()">
        <span class="sbtn-icon">💬</span> Envoyer via WhatsApp
      </button>
    </div>
  `;
  $('drawerFoot').innerHTML = '';
}

async function sendViaTelegram() {
  const btn = document.querySelector('.sbtn-tg');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Envoi…'; }

  const msg = buildMessage();
  // Convertir en Markdown Telegram (gras)
  const mdMsg = msg
    .replace('🛍️ Commande', '*🛍️ Commande')
    .replace('\n' + '─'.repeat(28), '*\n' + '─'.repeat(28));

  try {
    const res = await fetch(`${API}/api/notify`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg })
    });

    let data;
    try { data = await res.json(); } catch { data = {}; }

    if (!res.ok || !data.ok) {
      throw new Error(data.error || `HTTP ${res.status}`);
    }
    goToStep('success');
  } catch(e) {
    // Afficher l'erreur précise + fallback WhatsApp visible
    console.error('Telegram notify error:', e);
    const errMsg = e.message === 'Failed to fetch'
      ? 'Impossible de joindre le serveur. Utilisez WhatsApp.'
      : '❌ ' + e.message;
    toast(errMsg, 4000);
    if (btn) {
      btn.disabled = false;
      btn.innerHTML = '<span class="sbtn-icon">✈️</span> Envoyer via Telegram';
    }
  }
}

function sendViaWhatsApp() {
  const msg = buildMessage();
  const url = `https://wa.me/${ADMIN_WA}?text=${encodeURIComponent(msg)}`;
  if (tg) {
    tg.openLink(url);
  } else {
    window.open(url, '_blank');
  }
  goToStep('success');
}

// ── ÉTAPE 5 : Succès ───────────────────────────────────────────────────────
function renderSuccess() {
  $('drawerTitle').textContent = '';
  cart = []; saveCart();
  tg?.HapticFeedback?.notificationOccurred('success');

  $('drawerBody').innerHTML = `
    <div class="success">
      <div class="success-icon">🎉</div>
      <div class="success-title">Commande envoyée !</div>
      <div class="success-sub" style="margin-top:10px">
        Votre commande a été transmise à ${STORE_NAME}.<br>
        Vous serez contacté très rapidement pour confirmer.<br><br>
        Merci pour votre confiance ☕
      </div>
    </div>
  `;
  $('drawerFoot').innerHTML = `
    <button class="abtn abtn-primary" onclick="closeDrawer()">Retour à la boutique</button>
  `;
}

// ── Produits ───────────────────────────────────────────────────────────────
async function loadProducts() {
  try {
    const r = await fetch(`${API}/api/products`);
    if (!r.ok) throw new Error();
    products = await r.json();
  } catch {
    products = demoProducts();
  }
  buildCats();
  renderProducts(products);
  saveCart();
  const pid = new URLSearchParams(location.search).get('product');
  if (pid) { const p = products.find(x => x.id == pid); if (p) addToCart(p); }
}

  return [
    {id:1,name:'iPhone 15 Pro',description:'Titane. Le plus pro.',price:1299,image_url:'https://images.unsplash.com/photo-1695048133142-1a20484d2569?w=400',category_name:'Électronique',category_emoji:'📱'},

  ];

function buildCats() {
  const seen = new Map();
  products.forEach(p => { if (!seen.has(p.category_name)) seen.set(p.category_name, p); });
  const c = $('cats');
  seen.forEach((p, name) => {
    const el = document.createElement('div');
    el.className = 'chip'; el.dataset.cat = name;
    el.textContent = `${p.category_emoji} ${name}`;
    el.addEventListener('click', () => setFilter(name));
    c.appendChild(el);
  });
}

function setFilter(cat) {
  activeCat = cat;
  document.querySelectorAll('.chip').forEach(c =>
    c.classList.toggle('on', c.dataset.cat === cat || (!cat && c.dataset.cat === ''))
  );
  applyFilter();
}

function applyFilter() {
  const q = $('search').value.trim().toLowerCase();
  renderProducts(products.filter(p => {
    const mc = !activeCat || p.category_name === activeCat;
    const mq = !q || p.name.toLowerCase().includes(q) || (p.description||'').toLowerCase().includes(q);
    return mc && mq;
  }));
}

function renderProducts(list) {
  const el = $('main');
  if (!list.length) {
    el.innerHTML = `<div class="empty"><div style="font-size:44px">🔍</div><div style="color:var(--hint);margin-top:8px">Aucun produit trouvé</div></div>`;
    return;
  }
  el.innerHTML = `<div class="grid">${list.map((p,i) => `
    <div class="card" style="animation-delay:${i*.04}s">
      <img src="${p.image_url}" alt="${p.name}" loading="lazy" onerror="this.style.display='none'">
      <div class="card-body">
        <div class="card-name">${p.name}</div>
        <div class="card-price">${fmt(p.price)}</div>
        <button class="card-btn" onclick='addToCart(${JSON.stringify(p)})'>+ Ajouter</button>
      </div>
    </div>
  `).join('')}</div>`;
}

$('cats').querySelector('[data-cat=""]').addEventListener('click', () => setFilter(''));
let st;
$('search').addEventListener('input', () => { clearTimeout(st); st = setTimeout(applyFilter, 200); });
loadProducts();
</script>
